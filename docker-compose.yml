      - shared-network

  backoffice-web:
    build:
      context: src/portals/backoffice-web
      dockerfile: Dockerfile
    environment:
      NEXTAUTH_URL: "${GATEWAY_PUBLIC_URL}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      GATEWAY_URL: "http://tbe-gateway:8080"
      GATEWAY_PUBLIC_URL: "${GATEWAY_PUBLIC_URL}"
      KEYCLOAK_BACKOFFICE_ISSUER: "${KEYCLOAK_PUBLIC_URL}/realms/tbe-backoffice"
      KEYCLOAK_BACKOFFICE_CLIENT_ID: "tbe-backoffice-ui"
      KEYCLOAK_BACKOFFICE_CLIENT_SECRET: "${KEYCLOAK_BACKOFFICE_CLIENT_SECRET}"
      KEYCLOAK_BACKOFFICE_ADMIN_CLIENT_ID: "tbe-backoffice-admin"
      KEYCLOAK_BACKOFFICE_ADMIN_CLIENT_SECRET: "${KEYCLOAK_BACKOFFICE_ADMIN_CLIENT_SECRET}"
    networks:
      - shared-network

# ============================================================
# Named volumes for data persistence
# ============================================================
volumes:
  rabbitmq-data:
  redis-data:

networks:
  shared-network:
    name: shared-network
    external: true
