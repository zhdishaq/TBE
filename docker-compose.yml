      Redis__ConnectionString: "redis:6378,password=${REDIS_PASSWORD}"
      Keycloak__Authority: "${KEYCLOAK_PUBLIC_URL}/realms/tbe-b2c"
      Keycloak__Audience: "tbe-b2c-api"
      Keycloak__BaseUrl: "${KEYCLOAK_PUBLIC_URL}"
      Services__Gateway__BaseUrl: "${GATEWAY_PUBLIC_URL}"
      Services__Gateway__InternalBaseUrl: "http://tbe-gateway:8080"
      Hotelbeds__ApiKey: "${HOTELBEDS__APIKEY}"
      Hotelbeds__ApiSecret: "${HOTELBEDS__APISECRET}"
      Encryption__ActiveKeyBase64: "${ENCRYPTION__ACTIVEKEYBASE64}"
      Encryption__ActiveKeyVersion: "${ENCRYPTION__ACTIVEKEYVERSION:-1}"
      OpenTelemetry__OtlpEndpoint: "${OPENTELEMETRY__OTLPENDPOINT:-http://localhost:4317}"
    depends_on:
      rabbitmq: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - "6005:8080"
    networks:
      - shared-network

  pricing-service:
    build:
      context: .
      dockerfile: src/services/PricingService/PricingService.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ConnectionStrings__PricingDb: "${PRICING_DB_CONNECTION}"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_USER}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD}"
      Redis__ConnectionString: "redis:6378,password=${REDIS_PASSWORD}"
      Keycloak__Authority: "${KEYCLOAK_PUBLIC_URL}/realms/tbe-b2c"
      Keycloak__Audience: "tbe-b2c-api"
      Keycloak__BaseUrl: "${KEYCLOAK_PUBLIC_URL}"
      Services__Gateway__BaseUrl: "${GATEWAY_PUBLIC_URL}"
      Services__Gateway__InternalBaseUrl: "http://tbe-gateway:8080"
      Encryption__ActiveKeyBase64: "${ENCRYPTION__ACTIVEKEYBASE64}"
      Encryption__ActiveKeyVersion: "${ENCRYPTION__ACTIVEKEYVERSION:-1}"
      OpenTelemetry__OtlpEndpoint: "${OPENTELEMETRY__OTLPENDPOINT:-http://localhost:4317}"
    depends_on:
      rabbitmq: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - "6006:8080"
    networks:
      - shared-network

  notification-service:
    build:
      context: .
      dockerfile: src/services/NotificationService/NotificationService.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ConnectionStrings__NotificationDb: "${NOTIFICATION_DB_CONNECTION}"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_USER}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD}"
      Redis__ConnectionString: "redis:6378,password=${REDIS_PASSWORD}"
      Keycloak__Authority: "${KEYCLOAK_PUBLIC_URL}/realms/tbe-b2c"
      Keycloak__Audience: "tbe-b2c-api"
      Keycloak__BaseUrl: "${KEYCLOAK_PUBLIC_URL}"
      Services__Gateway__BaseUrl: "${GATEWAY_PUBLIC_URL}"
      Services__Gateway__InternalBaseUrl: "http://tbe-gateway:8080"
      Services__BookingService__BaseUrl: "http://booking-service:8080"
      SendGrid__ApiKey: "${SENDGRID__APIKEY}"
      SendGrid__FromEmail: "${SENDGRID__FROMEMAIL:-no-reply@tbe.travel}"
      SendGrid__FromName: "${SENDGRID__FROMNAME:-TBE Bookings}"
      SendGrid__SandboxMode: "${SENDGRID__SANDBOXMODE:-false}"
      Encryption__ActiveKeyBase64: "${ENCRYPTION__ACTIVEKEYBASE64}"
      Encryption__ActiveKeyVersion: "${ENCRYPTION__ACTIVEKEYVERSION:-1}"
      OpenTelemetry__OtlpEndpoint: "${OPENTELEMETRY__OTLPENDPOINT:-http://localhost:4317}"
    depends_on:
      rabbitmq: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - "6007:8080"
    networks:
      - shared-network

  crm-service:
    build:
      context: .
      dockerfile: src/services/CrmService/CrmService.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ConnectionStrings__CrmDb: "${CRM_DB_CONNECTION}"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_USER}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD}"
      Redis__ConnectionString: "redis:6378,password=${REDIS_PASSWORD}"
      Keycloak__Authority: "${KEYCLOAK_PUBLIC_URL}/realms/tbe-backoffice"
      Keycloak__Audience: "tbe-backoffice-api"
      Keycloak__BaseUrl: "${KEYCLOAK_PUBLIC_URL}"
      Services__Gateway__BaseUrl: "${GATEWAY_PUBLIC_URL}"
      Services__Gateway__InternalBaseUrl: "http://tbe-gateway:8080"
      Encryption__ActiveKeyBase64: "${ENCRYPTION__ACTIVEKEYBASE64}"
      Encryption__ActiveKeyVersion: "${ENCRYPTION__ACTIVEKEYVERSION:-1}"
      OpenTelemetry__OtlpEndpoint: "${OPENTELEMETRY__OTLPENDPOINT:-http://localhost:4317}"
    depends_on:
      rabbitmq: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - "6008:8080"
    networks:
      - shared-network

  backoffice-service:
    build:
      context: .
      dockerfile: src/services/BackofficeService/BackofficeService.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ConnectionStrings__BackofficeDb: "${BACKOFFICE_DB_CONNECTION}"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_USER}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD}"
      Redis__ConnectionString: "redis:6378,password=${REDIS_PASSWORD}"
      Keycloak__Authority: "${KEYCLOAK_PUBLIC_URL}/realms/tbe-backoffice"
      Keycloak__Audience: "tbe-backoffice-api"
      Keycloak__BaseUrl: "${KEYCLOAK_PUBLIC_URL}"
      KeycloakBackoffice__BaseUrl: "${KEYCLOAK_PUBLIC_URL}"
      KeycloakBackoffice__Realm: "tbe-backoffice"
      KeycloakBackoffice__ClientId: "backoffice-service"
      KeycloakBackoffice__ClientSecret: "${KEYCLOAK_BACKOFFICE_ADMIN_CLIENT_SECRET}"
      Services__Gateway__BaseUrl: "${GATEWAY_PUBLIC_URL}"
      Services__Gateway__InternalBaseUrl: "http://tbe-gateway:8080"
      Encryption__ActiveKeyBase64: "${ENCRYPTION__ACTIVEKEYBASE64}"
