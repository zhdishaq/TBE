services:

  # ============================================================
  # Wave 0 — Infrastructure (no dependencies)
  # ============================================================

  # mssql:
  #   image: mcr.microsoft.com/mssql/server:2022-latest
  #   environment:
  #     ACCEPT_EULA: "Y"
  #     MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
  #   volumes:
  #     - mssql-data:/var/opt/mssql
  #   ports:
  #     - "1433:1433"
  #   healthcheck:
  #     test: /opt/mssql-tools18/bin/sqlcmd -S localhost -C -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -b -o /dev/null
  #     interval: 10s
  #     timeout: 45s
  #     retries: 45
  #     start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD}"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - shared-network

  redis:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis-data:/data
    ports:
      - "6378:6378"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - shared-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.0
    # REMOVED --optimized to allow auto-build on start
    command: start --import-realm 
    environment:
      KC_HEALTH_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: "${KEYCLOAK_ADMIN_USER}"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      KC_DB: mssql
      KC_DB_URL: "jdbc:sqlserver://mssql;databaseName=KeycloakDb;encrypt=false"
      KC_DB_USERNAME: "${MSSQL_SA_USER}"
      KC_DB_PASSWORD: "${MSSQL_SA_PASSWORD}"
      
      # PROXY SETTINGS
      KC_PROXY_HEADERS: "x-forwarded"
      KC_HOSTNAME: "https://openid.3ha.one"
      KC_HOSTNAME_STRICT: "true"
      KC_HOSTNAME_STRICT_HTTPS: "true"
      KC_HTTP_ENABLED: "true"
      
      # This ensures the build phase respects the proxy config
      KC_HTTP_RELATIVE_PATH: "/"
    volumes:
      - ./infra/keycloak/realms:/opt/keycloak/data/import
    ports:
      - "8080:8080"
      - "9000:9000"
    networks:
      - shared-network
    
    #depends_on:
      # mssql:
      #   condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; cat <&3 | grep -q '\"status\": \"UP\"'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ============================================================
  # Wave 1 — Database Migrator (depends on mssql healthy)
  # ============================================================

  db-migrator:
    build:
      context: .
      dockerfile: src/tools/TBE.DbMigrator/Dockerfile
    networks:
      - shared-network
    environment:
      ConnectionStrings__BookingDb: "${BOOKING_DB_CONNECTION}"
      ConnectionStrings__PaymentDb: "${PAYMENT_DB_CONNECTION}"
      ConnectionStrings__SearchDb: "${SEARCH_DB_CONNECTION}"
      ConnectionStrings__PricingDb: "${PRICING_DB_CONNECTION}"
      ConnectionStrings__NotificationDb: "${NOTIFICATION_DB_CONNECTION}"
      ConnectionStrings__CrmDb: "${CRM_DB_CONNECTION}"
      ConnectionStrings__BackofficeDb: "${BACKOFFICE_DB_CONNECTION}"
      ConnectionStrings__FlightConnectorDb: "${FLIGHT_CONNECTOR_DB_CONNECTION}"
      ConnectionStrings__HotelConnectorDb: "${HOTEL_CONNECTOR_DB_CONNECTION}"
    # depends_on:
    #   mssql:
    #     condition: service_healthy
    restart: "no"

  # ============================================================
  # Wave 2 — Application Services
  # (depend on mssql + rabbitmq + redis healthy AND db-migrator completed)
  # ============================================================

  tbe-gateway:
    build:
      context: .
      dockerfile: src/gateway/TBE.Gateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_USER}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD}"
      Redis__ConnectionString: "redis:6378,password=${REDIS_PASSWORD}"
      Keycloak__BaseUrl: "http://keycloak:8080"
    depends_on:
      keycloak:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
    ports:
      - "5000:8080"
    networks:
      - shared-network

  booking-service:
    build:
      context: .
      dockerfile: src/services/BookingService/BookingService.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__BookingDb: "${BOOKING_DB_CONNECTION}"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_USER}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD}"
      Redis__ConnectionString: "redis:6378,password=${REDIS_PASSWORD}"
    depends_on:
      # mssql:
      #   condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
    ports:
      - "6001:8080"
    networks:
      - shared-network

  payment-service:
