services:

  # ============================================================
  # Wave 0 — Infrastructure (no dependencies)
  # ============================================================
  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD}"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - shared-network

  redis:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}" --port 6378
    volumes:
      - redis-data:/data
    ports:
      - "6378:6378"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6378", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - shared-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.0
    command: start --import-realm
    environment:
      KC_HEALTH_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: "${KEYCLOAK_ADMIN_USER}"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      KC_DB: mssql
      KC_DB_URL: "jdbc:sqlserver://mssql;databaseName=KeycloakDb;encrypt=false"
      KC_DB_USERNAME: "${MSSQL_SA_USER}"
      KC_DB_PASSWORD: "${MSSQL_SA_PASSWORD}"
      KC_PROXY_HEADERS: "xforwarded"
      KC_HOSTNAME: "https://openid.3ha.one"
      KC_HOSTNAME_STRICT: "true"
      KC_HOSTNAME_STRICT_HTTPS: "true"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: "/"
    volumes:
      - ./infra/keycloak/realms:/opt/keycloak/data/import
    ports:
      - "8080:8080"
      - "9000:9000"
    networks:
      - shared-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; cat <&3 | grep -q '\"status\": \"UP\"'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ============================================================
  # Wave 2 — Application Services
  # ============================================================
  tbe-gateway:
    build:
      context: .
      dockerfile: src/gateway/TBE.Gateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_USER}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD}"
      Redis__ConnectionString: "redis:6378,password=${REDIS_PASSWORD}"
      Keycloak__BaseUrl: "${KEYCLOAK_PUBLIC_URL}"
      Keycloak__Authority: "${KEYCLOAK_PUBLIC_URL}/realms/tbe-b2c"
      Keycloak__Audience: "tbe-b2c-api"
      PublicBaseUrl: "${GATEWAY_PUBLIC_URL}"
      OpenTelemetry__OtlpEndpoint: "${OPENTELEMETRY__OTLPENDPOINT:-http://localhost:4317}"
    depends_on:
      rabbitmq: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - "5000:8080"
    networks:
      - shared-network

  booking-service:
    build:
      context: .
      dockerfile: src/services/BookingService/BookingService.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ConnectionStrings__BookingDb: "${BOOKING_DB_CONNECTION}"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_USER}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD}"
      Redis__ConnectionString: "redis:6378,password=${REDIS_PASSWORD}"
      Keycloak__Authority: "${KEYCLOAK_PUBLIC_URL}/realms/tbe-b2c"
      Keycloak__Audience: "tbe-b2c-api"
      Keycloak__BaseUrl: "${KEYCLOAK_PUBLIC_URL}"
      KeycloakB2B__BaseUrl: "${KEYCLOAK_PUBLIC_URL}"
      KeycloakB2B__Realm: "tbe-b2b"
      KeycloakB2B__ClientId: "booking-service"
      KeycloakB2B__ClientSecret: "${KEYCLOAKB2B__BOOKING__CLIENTSECRET}"
      KeycloakB2B__AgentAdminRole: "agent-admin"
      Services__Gateway__BaseUrl: "${GATEWAY_PUBLIC_URL}"
      Services__Gateway__InternalBaseUrl: "http://tbe-gateway:8080"
      Services__FlightConnector__BaseUrl: "http://flight-connector-service:8080"
      Encryption__ActiveKeyBase64: "${ENCRYPTION__ACTIVEKEYBASE64}"
      Encryption__ActiveKeyVersion: "${ENCRYPTION__ACTIVEKEYVERSION:-1}"
      OpenTelemetry__OtlpEndpoint: "${OPENTELEMETRY__OTLPENDPOINT:-http://localhost:4317}"
    depends_on:
      rabbitmq: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - "6001:8080"
    networks:
      - shared-network

  payment-service:
    build:
      context: .
      dockerfile: src/services/PaymentService/PaymentService.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ConnectionStrings__PaymentDb: "${PAYMENT_DB_CONNECTION}"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_USER}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD}"
      Redis__ConnectionString: "redis:6378,password=${REDIS_PASSWORD}"
      Keycloak__Authority: "${KEYCLOAK_PUBLIC_URL}/realms/tbe-b2c"
      Keycloak__Audience: "tbe-b2c-api"
      Keycloak__BaseUrl: "${KEYCLOAK_PUBLIC_URL}"
      KeycloakB2B__BaseUrl: "${KEYCLOAK_PUBLIC_URL}"
      KeycloakB2B__Realm: "tbe-b2b"
      KeycloakB2B__ClientId: "payment-service"
      KeycloakB2B__ClientSecret: "${KEYCLOAKB2B__CLIENTSECRET}"
      KeycloakB2B__AgentAdminRole: "agent-admin"
      Stripe__ApiKey: "${STRIPE__APIKEY}"
      Stripe__PublishableKey: "${STRIPE__PUBLISHABLEKEY}"
      Stripe__WebhookSecret: "${STRIPE__WEBHOOKSECRET}"
      Wallet__TopUp__MinAmount: "${WALLET__TOPUP__MINAMOUNT:-10}"
      Wallet__TopUp__MaxAmount: "${WALLET__TOPUP__MAXAMOUNT:-50000}"
      Wallet__LowBalance__DefaultThreshold: "${WALLET__LOWBALANCE__DEFAULTTHRESHOLD:-500}"
      Wallet__LowBalance__EmailCooldownHours: "${WALLET__LOWBALANCE__EMAILCOOLDOWNHOURS:-24}"
      Wallet__LowBalance__PollIntervalMinutes: "${WALLET__LOWBALANCE__POLLINTERVALMINUTES:-15}"
      Services__Gateway__BaseUrl: "${GATEWAY_PUBLIC_URL}"
      Services__Gateway__InternalBaseUrl: "http://tbe-gateway:8080"
      Encryption__ActiveKeyBase64: "${ENCRYPTION__ACTIVEKEYBASE64}"
      Encryption__ActiveKeyVersion: "${ENCRYPTION__ACTIVEKEYVERSION:-1}"
      OpenTelemetry__OtlpEndpoint: "${OPENTELEMETRY__OTLPENDPOINT:-http://localhost:4317}"
    depends_on:
      rabbitmq: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - "6002:8080"
    networks:
      - shared-network

  search-service:
    build:
      context: .
      dockerfile: src/services/SearchService/SearchService.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ConnectionStrings__SearchDb: "${SEARCH_DB_CONNECTION}"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_USER}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD}"
      Redis__ConnectionString: "redis:6378,password=${REDIS_PASSWORD}"
      Keycloak__Authority: "${KEYCLOAK_PUBLIC_URL}/realms/tbe-b2c"
      Keycloak__Audience: "tbe-b2c-api"
      Keycloak__BaseUrl: "${KEYCLOAK_PUBLIC_URL}"
      Keycloak__ServiceClientId: "tbe-b2c-admin"
      Keycloak__ServiceClientSecret: "${KEYCLOAK_B2C_ADMIN_CLIENT_SECRET}"
      Services__Gateway__BaseUrl: "${GATEWAY_PUBLIC_URL}"
      Services__Gateway__InternalBaseUrl: "http://tbe-gateway:8080"
      Services__FlightConnector__BaseUrl: "http://flight-connector-service:8080"
      Services__PricingService__BaseUrl: "http://pricing-service:8080"
      OpenTelemetry__OtlpEndpoint: "${OPENTELEMETRY__OTLPENDPOINT:-http://localhost:4317}"
    depends_on:
      rabbitmq: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - "6003:8080"
    networks:
      - shared-network

  flight-connector-service:
    build:
      context: .
      dockerfile: src/services/FlightConnectorService/FlightConnectorService.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ConnectionStrings__FlightConnectorDb: "${FLIGHT_CONNECTOR_DB_CONNECTION}"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_USER}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD}"
      Redis__ConnectionString: "redis:6378,password=${REDIS_PASSWORD}"
      Keycloak__Authority: "${KEYCLOAK_PUBLIC_URL}/realms/tbe-b2c"
      Keycloak__Audience: "tbe-b2c-api"
      Keycloak__BaseUrl: "${KEYCLOAK_PUBLIC_URL}"
      Services__Gateway__BaseUrl: "${GATEWAY_PUBLIC_URL}"
      Services__Gateway__InternalBaseUrl: "http://tbe-gateway:8080"
      Amadeus__ApiKey: "${AMADEUS__APIKEY}"
      Amadeus__ApiSecret: "${AMADEUS__APISECRET}"
      Sabre__UseMock: "${SABRE__USEMOCK:-true}"
      Sabre__ClientId: "${SABRE__CLIENTID}"
      Sabre__ClientSecret: "${SABRE__CLIENTSECRET}"
      Sabre__PseudoCityCode: "${SABRE__PSEUDOCITYCODE:-XXXX}"
      Sabre__BaseUrl: "${SABRE__BASEURL:-https://api.cert.platform.sabre.com}"
      Sabre__TokenUrl: "${SABRE__TOKENURL:-https://api.cert.platform.sabre.com/v2/auth/token}"
      Galileo__Username: "${GALILEO__USERNAME}"
      Galileo__Password: "${GALILEO__PASSWORD}"
      Encryption__ActiveKeyBase64: "${ENCRYPTION__ACTIVEKEYBASE64}"
      Encryption__ActiveKeyVersion: "${ENCRYPTION__ACTIVEKEYVERSION:-1}"
      OpenTelemetry__OtlpEndpoint: "${OPENTELEMETRY__OTLPENDPOINT:-http://localhost:4317}"
    depends_on:
      rabbitmq: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - "6004:8080"
    networks:
      - shared-network

  hotel-connector-service:
    build:
      context: .
      dockerfile: src/services/HotelConnectorService/HotelConnectorService.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ConnectionStrings__HotelConnectorDb: "${HOTEL_CONNECTOR_DB_CONNECTION}"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_USER}"
