      - "6009:8080"
    networks:
      - shared-network

  # ============================================================
  # Wave 3 — UI Portals (Next.js)
  # ============================================================
  b2c-web:
    build:
      context: src/portals/b2c-web
      dockerfile: Dockerfile
    environment:
      NEXTAUTH_URL: "${GATEWAY_PUBLIC_URL}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      GATEWAY_URL: "http://tbe-gateway:8080"
      GATEWAY_PUBLIC_URL: "${GATEWAY_PUBLIC_URL}"
      KEYCLOAK_B2C_ISSUER: "${KEYCLOAK_PUBLIC_URL}/realms/tbe-b2c"
      KEYCLOAK_B2C_CLIENT_ID: "tbe-b2c"
      KEYCLOAK_B2C_CLIENT_SECRET: "${KEYCLOAK_B2C_CLIENT_SECRET}"
      KEYCLOAK_B2C_ADMIN_CLIENT_ID: "tbe-b2c-admin"
      KEYCLOAK_B2C_ADMIN_CLIENT_SECRET: "${KEYCLOAK_B2C_ADMIN_CLIENT_SECRET}"
      NEXT_PUBLIC_STRIPE_PK: "${STRIPE__PUBLISHABLEKEY}"
    networks:
      - shared-network

  b2b-web:
    build:
      context: src/portals/b2b-web
      dockerfile: Dockerfile
    environment:
      NEXTAUTH_URL: "${GATEWAY_PUBLIC_URL}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      GATEWAY_URL: "http://tbe-gateway:8080"
      GATEWAY_PUBLIC_URL: "${GATEWAY_PUBLIC_URL}"
      KEYCLOAK_B2B_ISSUER: "${KEYCLOAK_PUBLIC_URL}/realms/tbe-b2b"
      KEYCLOAK_B2B_CLIENT_ID: "tbe-agent-portal"
      KEYCLOAK_B2B_CLIENT_SECRET: "${KEYCLOAK_B2B_CLIENT_SECRET:-}"
      KEYCLOAK_B2B_ADMIN_CLIENT_ID: "tbe-b2b-admin"
      KEYCLOAK_B2B_ADMIN_CLIENT_SECRET: "${KEYCLOAK_B2B_ADMIN_CLIENT_SECRET:-}"
      NEXT_PUBLIC_STRIPE_PK: "${STRIPE__PUBLISHABLEKEY}"
